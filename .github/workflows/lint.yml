name: Lint

on:
  push:
    paths: &paths
      - "lint/**"
      - ".github/workflows/lint.yml"
  pull_request:
    paths: *paths

jobs:
  publish:
    name: Docker Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Test
        run: docker build --target test .
        working-directory: lint
      - name: Build
        run: docker build --target production .
        working-directory: lint
